backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "courses"
    label: "Courses"
    folder: "src/content/courses"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Icon (FontAwesome class)", name: "icon", widget: "string", default: "fas fa-book"}
      - {label: "Description", name: "desc", widget: "text"}

  - name: "blogs"
    label: "Blog Posts"
    folder: "src/content/blogs"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "SEO Meta Description", name: "description", widget: "text", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
