backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "courses"
    label: "Courses"
    folder: "src/content/courses"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Icon (FontAwesome class)", name: "icon", widget: "string", default: "fas fa-book"}
      - {label: "Description", name: "desc", widget: "text"}

  - name: "blogs"
    label: "Blog Posts"
    folder: "src/content/blogs"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "SEO Meta Description", name: "description", widget: "text", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/pages/home.md"
        fields:
          - {label: "Slide 1 Image", name: "slide1_image", widget: "image", required: false}
          - {label: "Slide 1 Title", name: "slide1_title", widget: "string"}
          - {label: "Slide 1 Subtitle", name: "slide1_subtitle", widget: "string"}
          - {label: "Slide 1 Text", name: "slide1_text", widget: "text"}
          - {label: "Slide 2 Image", name: "slide2_image", widget: "image", required: false}
          - {label: "Slide 2 Title", name: "slide2_title", widget: "string"}
          - {label: "Slide 2 Subtitle", name: "slide2_subtitle", widget: "string"}
          - {label: "Slide 2 Text", name: "slide2_text", widget: "text"}
          - {label: "Vision Statement", name: "vision", widget: "text"}
          - {label: "Mission Statement", name: "mission", widget: "text"}
      - name: "about"
        label: "About Page"
        file: "src/content/pages/about.md"
        fields:
          - {label: "Founder Image", name: "founder_image", widget: "image", required: false}
          - {label: "Founder Bio", name: "founder_bio", widget: "text"}
          - {label: "Founder Quote", name: "founder_quote", widget: "text"}
          - {label: "Moses Image", name: "moses_image", widget: "image", required: false}
          - {label: "Moses Bio", name: "moses_bio", widget: "text"}

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings (Colors & Contacts)"
        file: "src/content/settings/general.json"
        fields:
          - {label: "Primary Brand Color", name: "primary_color", widget: "color", default: "#1A962B"}
          - {label: "Email Address", name: "email", widget: "string", default: "info@vookvoiceinternational.org"}
          - {label: "Phone Number", name: "phone", widget: "string", default: "+254 700 000 000"}
          - {label: "Physical Address", name: "address", widget: "string", default: "Nairobi, Kenya"}
